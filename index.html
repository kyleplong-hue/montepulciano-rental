function MapsBtn({q}){if(!q)return null;return <a href={MB+q} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,color:T.gold,textDecoration:"none",padding:"3px 8px",background:T.gold+"12",borderRadius:5,border:"1px solid "+T.gold+"20"}}>📍 Maps</a>;}
function BookBadge({url}){return url?<a href={url} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,color:T.red,textDecoration:"none",padding:"3px 8px",background:"#2D1818",borderRadius:5,border:"1px solid #5C282833"}}>📞 Book</a>:<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,color:T.red,padding:"3px 8px",background:"#2D1818",borderRadius:5,border:"1px solid #5C282833"}}>📞 Book Ahead</span>;}
function fmtDate(d){if(!d)return"";try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}catch{return d;}}
function addDays(d,n){const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];}

/* ═══ WEEK TAB ═══ */
function WeekTab({week,setWeek,terms,guestInfo}){
  const[open,setOpen]=useState(0);const[dragDay,setDragDay]=useState(null);const[dragBlock,setDragBlock]=useState(null);
  const onDDS=(e,i)=>{setDragDay(i);setDragBlock(null);e.dataTransfer.effectAllowed="move";};
  const onDDO=(e,i)=>{e.preventDefault();if(dragDay===null||dragDay===i)return;setWeek(w=>{const n=[...w];const it=n.splice(dragDay,1)[0];n.splice(i,0,it);setDragDay(i);return n;});};
  const onBDS=(e,di,bi)=>{e.stopPropagation();setDragBlock({di,bi});setDragDay(null);e.dataTransfer.effectAllowed="move";};
  const onBDO=(e,di,bi)=>{e.preventDefault();e.stopPropagation();if(!dragBlock||dragBlock.di!==di||dragBlock.bi===bi)return;
    setWeek(w=>w.map((d,i)=>{if(i!==di)return d;const nb=[...d.blocks];const it=nb.splice(dragBlock.bi,1)[0];nb.splice(bi,0,it);setDragBlock({di,bi});return{...d,blocks:nb};}));};
  const usedLabels=new Set(week.flatMap(d=>d.blocks.map(b=>b.l)));
  const delB=(di,bi)=>setWeek(w=>w.map((d,i)=>i===di?{...d,blocks:d.blocks.filter((_,j)=>j!==bi)}:d));
  const repB=(di,bi)=>{const b=week[di].blocks[bi];const alt=getAlt(b.cat||b.tag,usedLabels);setWeek(w=>w.map((d,i)=>i===di?{...d,blocks:d.blocks.map((bl,j)=>j===bi?{id:"n"+Date.now(),t:bl.t,l:alt.l,d:alt.d,tag:alt.tag,cat:alt.cat,map:alt.map||null,book:!!alt.book,bookUrl:alt.bookUrl}:bl)}:d));};
  const dirUrl=day=>{const stops=day.blocks.filter(b=>b.map);if(!stops.length)return null;if(stops.length===1)return MB+stops[0].map;const o=stops[0].map.replace(/\+/g," "),d=stops[stops.length-1].map.replace(/\+/g," "),wp=stops.slice(1,-1).map(s=>s.map.replace(/\+/g," ")).join("|");return"https://www.google.com/maps/dir/?api=1&origin="+encodeURIComponent(o)+"&destination="+encodeURIComponent(d)+(wp?"&waypoints="+encodeURIComponent(wp):"");};

  return<div style={{padding:"16px 12px",maxWidth:780,margin:"0 auto"}}>
    <div style={{textAlign:"center",marginBottom:16}}><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:T.cream}}>{guestInfo?"Your Week, "+guestInfo.name.split(" ")[0]:"Your Week at Molino Nobile"}</h2><p style={{fontSize:11,color:T.mut,maxWidth:460,margin:"4px auto 0",lineHeight:1.5}}>Drag days to reorder · drag blocks within a day · swap or delete anything</p></div>
    <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginBottom:14}}>{Object.entries(TS).map(([k,v])=><span key={k} style={{fontSize:9,color:v.a,background:v.bg,padding:"2px 7px",borderRadius:10,border:"1px solid "+v.a+"20"}}>{v.i} {k}</span>)}</div>
    {week.map((day,di)=>{const du=dirUrl(day);const dn=di+1;const dayDate=guestInfo?.checkin?fmtDate(addDays(guestInfo.checkin,di)):null;return(
      <div key={day.id||di} draggable onDragStart={e=>onDDS(e,di)} onDragOver={e=>onDDO(e,di)} onDragEnd={()=>setDragDay(null)} style={{marginBottom:8,opacity:dragDay===di?.5:1,cursor:"grab"}}>
        <button onClick={()=>setOpen(open===di?-1:di)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:open===di?T.card:T.dw,border:"1px solid "+(open===di?day.accent+"44":T.bdr),borderRadius:open===di?"11px 11px 0 0":"11px",padding:"12px 14px",cursor:"pointer"}}>
          <span style={{fontSize:11,color:T.mut,cursor:"grab",userSelect:"none"}}>⠿</span><span style={{fontSize:22}}>{day.emoji}</span>
          <div style={{textAlign:"left",flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:600,color:T.cream}}>Day {dn} {dayDate&&<span style={{fontSize:11,fontWeight:400,color:T.mut}}>· {dayDate}</span>} <span style={{color:day.accent}}>— {day.title}</span></div>
            <div style={{fontSize:10,color:T.mut}}>{day.sub}</div>
          </div>
          {du&&<a href={du} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:9,color:T.gold,textDecoration:"none",padding:"4px 8px",background:T.gold+"12",borderRadius:6,border:"1px solid "+T.gold+"20",whiteSpace:"nowrap"}}>🗺️ Route</a>}
          <span style={{color:day.accent,transform:open===di?"rotate(180deg)":"none",fontSize:14,transition:"transform .15s"}}>▾</span>
        </button>
        {open===di&&<div style={{background:T.card,borderRadius:"0 0 11px 11px",padding:"8px 5px 5px",border:"1px solid "+day.accent+"22",borderTop:"none"}}>
          {day.blocks.map((b,bi)=>{const s=TS[b.tag]||TS.activity;const iDB=dragBlock&&dragBlock.di===di&&dragBlock.bi===bi;return(
            <div key={b.id||bi} draggable onDragStart={e=>onBDS(e,di,bi)} onDragOver={e=>onBDO(e,di,bi)} onDragEnd={()=>setDragBlock(null)}
              style={{display:"flex",gap:6,marginBottom:5,opacity:iDB?.4:1,cursor:"grab"}}>
              <div style={{width:52,textAlign:"right",paddingTop:8,flexShrink:0}}><span style={{fontSize:10,color:T.mut}}>{b.t}</span></div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:14}}><div style={{width:7,height:7,borderRadius:"50%",background:s.a,marginTop:10,flexShrink:0}}/><div style={{width:1,flex:1,background:T.mut+"18",marginTop:2}}/></div>
              <div style={{flex:1,background:s.bg,borderRadius:9,padding:"8px 10px",border:"1px solid "+s.a+"15"}}>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  <span style={{fontSize:12}}>{s.i}</span>
                  <span style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:600,color:s.a,flex:1,minWidth:0}}>{aT(b.l,terms)}</span>
                  <button onClick={()=>repB(di,bi)} title="Swap for similar idea" style={{fontSize:12,color:T.gold,background:T.gold+"18",border:"1px solid "+T.gold+"35",borderRadius:7,padding:"4px 12px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>↻ New Idea</button>
                  <button onClick={()=>delB(di,bi)} title="Remove" style={{fontSize:12,color:T.red,background:T.red+"12",border:"1px solid "+T.red+"30",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>✕</button>
                </div>
                <p style={{fontSize:11,color:T.cream+"bb",lineHeight:1.45,marginTop:3}}>{aT(b.d,terms)}</p>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>{b.map&&<MapsBtn q={b.map}/>}{b.book&&<BookBadge url={b.bookUrl}/>}</div>
              </div>
            </div>);})}
        </div>}
      </div>);})}
  </div>;

        guests.map(g=><div key={g.id} style={{background:T.dw,borderRadius:10,padding:14,marginBottom:8,border:"1px solid "+T.bdr}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div><div style={{fontSize:14,fontWeight:600,color:T.cream}}>{g.name}</div><div style={{fontSize:10,color:T.mut}}>{fmtDate(g.checkin)} → {fmtDate(g.checkout)} · {g.week.length} days</div></div>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>genLink(g)} style={{fontSize:11,color:copied===g.id?T.ol:T.gold,background:copied===g.id?T.ol+"15":T.gold+"15",border:"1px solid "+(copied===g.id?T.ol:T.gold)+"33",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>{copied===g.id?"✓ Copied!":"🔗 Copy Link"}</button>
              <button onClick={()=>delGuest(g.id)} style={{fontSize:11,color:T.red,background:T.red+"10",border:"1px solid "+T.red+"25",borderRadius:7,padding:"5px 8px",cursor:"pointer"}}>✕</button>
            </div>
          </div>
          {g.notes&&<p style={{fontSize:11,color:T.gold,marginBottom:4}}>📝 {g.notes}</p>}
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{g.week.map((d,i)=><span key={i} style={{fontSize:9,padding:"2px 6px",background:T.card,borderRadius:5,color:T.mut,border:"1px solid "+T.bdr}}>{d.emoji} {d.title}</span>)}</div>
        </div>)
      }
    </div>

    {/* ═══ TERMS ═══ */}
    <div style={{background:T.card,borderRadius:12,padding:16,border:"1px solid "+T.bdr,marginBottom:16}}>
      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:T.gl,marginBottom:10}}>🔄 Global Term Replacements</h3>
      {Object.entries(terms).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"6px 10px",background:T.dw,borderRadius:8,border:"1px solid "+T.bdr}}><span style={{fontSize:11,color:T.red,textDecoration:"line-through",flex:1}}>{k}</span><span style={{fontSize:11,color:T.mut}}>→</span><span style={{fontSize:11,color:T.ol,flex:1}}>{v}</span><button onClick={()=>setTerms(p=>{const n={...p};delete n[k];return n;})} style={{fontSize:10,color:T.red,background:"none",border:"none",cursor:"pointer"}}>✕</button></div>)}
      <div style={{display:"flex",gap:6,marginTop:8}}><input value={nk} onChange={e=>setNk(e.target.value)} placeholder="Find..." style={{flex:1,...iS}}/><span style={{color:T.mut,alignSelf:"center"}}>→</span><input value={nv} onChange={e=>setNv(e.target.value)} placeholder="Replace..." style={{flex:1,...iS}}/><button onClick={add} style={{padding:"7px 14px",background:nk&&nv?T.gold:T.card,color:nk&&nv?T.dark:T.mut,border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:nk&&nv?"pointer":"default"}}>Add</button></div>
    </div>

    {/* ═══ STATS ═══ */}
    <div style={{background:T.card,borderRadius:12,padding:16,border:"1px solid "+T.bdr}}>
      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:T.gl,marginBottom:8}}>📊 Idea Bank: {ALTS.length} ideas</h3>
      <p style={{fontSize:11,color:T.cream+"bb",lineHeight:1.6}}>{ALTS.filter(a=>a.cat==="dinner").length} dinners · {ALTS.filter(a=>a.cat==="lunch").length} lunches · {ALTS.filter(a=>["breakfast","cafe","gelato"].includes(a.cat)).length} breakfast/café · {ALTS.filter(a=>a.cat==="wine").length} wineries · {ALTS.filter(a=>["town","nature","experience","spa"].includes(a.cat)).length} activities. The ↻ New Idea button matches by category.</p>
    </div>
  </div>;
}

/* ═══ APP ═══ */
function App(){
  const[tab,setTab]=useState("week");
  const[isOwner,setIsOwner]=useState(false);
  const[terms,setTerms]=useState(DEFAULT_TERMS);
  const[week,setWeek]=useState(initWeek);
  const[requests,setRequests]=useState([]);
  const[guests,setGuests]=useState([]);
  const[guestMode,setGuestMode]=useState(false);
  const[guestInfo,setGuestInfo]=useState(null);

  // Check URL for guest mode on mount
  useEffect(()=>{
    const gId=getURLGuest();
    if(!gId)return;
    // Try localStorage first (returning guest)
    const saved=loadGuestData(gId);
    if(saved){
      setGuestInfo({name:saved.name,checkin:saved.checkin,checkout:saved.checkout});
      setWeek(saved.week);
      setGuestMode(true);
      return;
    }
    // Try URL-encoded data (first visit)
    const decoded=decodeGuestURL();
    if(decoded){
      setGuestInfo({name:decoded.name,checkin:decoded.checkin,checkout:decoded.checkout});
      setWeek(decoded.week);
      saveGuestData(gId,decoded);
      setGuestMode(true);
    }
  },[]);

  // Auto-save guest edits
  useEffect(()=>{
    if(!guestMode)return;
    const gId=getURLGuest();
    if(!gId)return;
    const data={...guestInfo,id:gId,week};
    saveGuestData(gId,data);
  },[week,guestMode,guestInfo]);

  return<div style={{minHeight:"100vh",background:T.dark,position:"relative",zIndex:1}}>
    <Header tab={tab} setTab={setTab} isOwner={isOwner} setIsOwner={setIsOwner} guestMode={guestMode} guestInfo={guestInfo}/>
    {tab==="week"&&<WeekTab week={week} setWeek={setWeek} terms={terms} guestInfo={guestInfo}/>}
    {tab==="trips"&&<TripsTab terms={terms}/>}
    {tab==="info"&&<InfoTab/>}
    {tab==="requests"&&<RequestsTab requests={requests} setRequests={setRequests} isOwner={isOwner}/>}
    {tab==="chat"&&<ChatTab terms={terms} guestInfo={guestInfo}/>}
    {tab==="owner"&&isOwner&&<OwnerTab terms={terms} setTerms={setTerms} week={week} guests={guests} setGuests={setGuests}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
