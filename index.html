          <div><label style={{fontSize:10,color:T.mut,display:"block",marginBottom:3}}>Notes</label><input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Allergies, highchair..." style={iS}/></div>
        </div>
        <button onClick={submit} style={{width:"100%",padding:"10px",background:form.venue&&form.guests?T.gold:T.card,color:form.venue&&form.guests?T.dark:T.mut,border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:form.venue&&form.guests?"pointer":"default"}}>Submit Request</button>
      </>}
    </div>}
    {requests.length===0&&<div style={{textAlign:"center",padding:40,color:T.mut,fontSize:12}}>{isOwner?"No requests yet.":"Your requests will appear here."}</div>}
    {requests.map(r=><div key={r.id} style={{background:T.card,borderRadius:10,padding:14,marginBottom:8,border:`1px solid ${r.status==="confirmed"?T.ol+"44":r.status==="declined"?T.red+"44":T.bdr}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:600,color:T.cream}}>{r.venue}</div>
        <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:600,background:r.status==="confirmed"?`${T.ol}20`:r.status==="declined"?"#2D1818":T.dw,color:r.status==="confirmed"?T.ol:r.status==="declined"?T.red:T.gold}}>{r.status==="confirmed"?"✓ Confirmed":r.status==="declined"?"✗ Declined":"⏳ Pending"}</span>
      </div>
      <div style={{display:"flex",gap:16,fontSize:11,color:T.mut,marginBottom:4}}>{r.date&&<span>📅 {r.date}</span>}{r.time&&<span>🕐 {r.time}</span>}{r.guests&&<span>👥 {r.guests}</span>}{r.phone&&<span>📱 {r.phone}</span>}</div>
      {r.notes&&<p style={{fontSize:11,color:`${T.cream}99`}}>Note: {r.notes}</p>}
      {r.ownerNotes&&<p style={{fontSize:11,color:T.ol,marginTop:4}}>🏡 Host: {r.ownerNotes}</p>}
      {isOwner&&r.status==="pending"&&<div style={{display:"flex",gap:6,marginTop:8}}>
        <button onClick={()=>updS(r.id,"confirmed")} style={{flex:1,padding:"7px",background:`${T.ol}20`,color:T.ol,border:`1px solid ${T.ol}33`,borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>✓ Confirm</button>
        <button onClick={()=>updS(r.id,"declined")} style={{flex:1,padding:"7px",background:"#2D1818",color:T.red,border:"1px solid #5C282833",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>✗ Decline</button>
        <input placeholder="Add notes..." onBlur={e=>updN(r.id,e.target.value)} style={{flex:2,padding:"7px 10px",background:T.dw,border:`1px solid ${T.bdr}`,borderRadius:7,color:T.cream,fontSize:11,outline:"none"}}/>
      </div>}
    </div>)}
  </div>);
}

function ChatTab({terms}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Ciao! 🌿 I'm your Molino Nobile concierge. Tell me what you're in the mood for, ask about the house, or let me plan your day!\n\nTip: Use the Requests tab to ask your host to book restaurants and experiences!"}]);
  const [input,setInput]=useState("");const [loading,setLoading]=useState(false);const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
  const chips=["Plan today — we have kids","Best winery for beginners?","Restaurant for tonight?","Rainy day plan?","WiFi password?","Book a private chef"];
  const send=async(text)=>{if(!text.trim()||loading)return;const um={role:"user",content:text.trim()};setMsgs(p=>[...p,um]);setInput("");setLoading(true);
    try{const h=[...msgs.filter(m=>m.role!=="system"),um].map(m=>({role:m.role,content:m.content}));const res=await fetch(API_PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:GUIDE,messages:h})});const data=await res.json();const reply=data.content?.map(b=>b.text||"").join("\n")||"Sorry, try again!";setMsgs(p=>[...p,{role:"assistant",content:reply}]);}
    catch{setMsgs(p=>[...p,{role:"assistant",content:"Connection issue. Check the Essentials tab or text Kyle at +39 348 363 4104!"}]);}setLoading(false);};
  const renderMsg=text=>{const parts=linkP(aT(text,terms));if(typeof parts==="string")return parts;return parts.map((p,i)=>typeof p==="string"?<span key={i}>{p}</span>:<a key={i} href={`${MB}${p.query}`} target="_blank" rel="noopener noreferrer" style={{color:T.gold,textDecoration:"underline",textDecorationColor:`${T.gold}55`,textUnderlineOffset:2}}>{p.place}</a>);};
  return(<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 95px)",maxWidth:780,margin:"0 auto"}}>
    <div style={{flex:1,overflowY:"auto",padding:"12px 12px 6px"}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:8}}>
        {m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${T.gold},${T.terra})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,marginRight:5,flexShrink:0,marginTop:2}}>🏡</div>}
        <div style={{maxWidth:"82%",padding:"9px 12px",borderRadius:m.role==="user"?"13px 13px 3px 13px":"13px 13px 13px 3px",background:m.role==="user"?T.gold:T.dw,color:m.role==="user"?T.dark:T.cream,fontSize:12,lineHeight:1.6,whiteSpace:"pre-wrap",border:m.role==="user"?"none":`1px solid ${T.bdr}`}}>{m.role==="assistant"?renderMsg(m.content):m.content}</div>
      </div>)}
      {loading&&<div style={{display:"flex",gap:5,marginBottom:8}}><div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${T.gold},${T.terra})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🏡</div><div style={{padding:"9px 12px",background:T.dw,borderRadius:"13px 13px 13px 3px",border:`1px solid ${T.bdr}`,color:T.mut,fontSize:12}}><span style={{animation:"pulse 1s ease infinite"}}>●</span><span style={{animation:"pulse 1s ease infinite .2s"}}> ●</span><span style={{animation:"pulse 1s ease infinite .4s"}}> ●</span></div></div>}
      {msgs.length<=1&&!loading&&<div style={{marginTop:4}}><p style={{fontSize:10,color:T.mut,marginBottom:6}}>Quick questions:</p><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{chips.map((c,i)=><button key={i} onClick={()=>send(c)} style={{background:T.dw,border:`1px solid ${T.gold}20`,color:T.gl,fontSize:10,padding:"6px 10px",borderRadius:16,cursor:"pointer"}}>{c}</button>)}</div></div>}
      <div ref={endRef}/>
    </div>
    <div style={{padding:"6px 12px 12px",borderTop:`1px solid ${T.bdr}`,background:T.dark}}>
      <div style={{display:"flex",gap:5}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(input)} placeholder="Ask about restaurants, wineries, activities..." style={{flex:1,padding:"10px 12px",background:T.dw,border:`1px solid ${T.bdr}`,borderRadius:9,color:T.cream,fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
        <button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{padding:"10px 16px",background:input.trim()?T.gold:T.card,border:"none",borderRadius:9,color:input.trim()?T.dark:T.mut,fontWeight:600,fontSize:12,cursor:input.trim()?"pointer":"default"}}>Send</button>
      </div>
    </div>
  </div>);
}

function OwnerTab({terms,setTerms}){
  const [nk,setNk]=useState("");const [nv,setNv]=useState("");
  const add=()=>{if(nk&&nv){setTerms(p=>({...p,[nk]:nv}));setNk("");setNv("");}};
  const rem=k=>setTerms(p=>{const n={...p};delete n[k];return n;});
  return(<div style={{padding:"16px 12px",maxWidth:780,margin:"0 auto"}}>
    <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:T.cream,textAlign:"center",marginBottom:4}}>Owner Dashboard</h2>
    <p style={{fontSize:11,color:T.mut,textAlign:"center",marginBottom:16}}>Edit terms that cascade across all content.</p>
    <div style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.bdr}`,marginBottom:16}}>
      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:T.gl,marginBottom:10}}>🔄 Global Term Replacements</h3>
      <p style={{fontSize:10,color:T.mut,marginBottom:10}}>Change a word or phrase everywhere at once.</p>
      {Object.entries(terms).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"6px 10px",background:T.dw,borderRadius:8,border:`1px solid ${T.bdr}`}}>
        <span style={{fontSize:11,color:T.red,textDecoration:"line-through",flex:1}}>{k}</span><span style={{fontSize:11,color:T.mut}}>→</span><span style={{fontSize:11,color:T.ol,flex:1}}>{v}</span>
        <button onClick={()=>rem(k)} style={{fontSize:10,color:T.red,background:"none",border:"none",cursor:"pointer"}}>✕</button>
      </div>)}
      <div style={{display:"flex",gap:6,marginTop:8}}>
        <input value={nk} onChange={e=>setNk(e.target.value)} placeholder="Find this..." style={{flex:1,padding:"7px 10px",background:T.dw,border:`1px solid ${T.bdr}`,borderRadius:7,color:T.cream,fontSize:11,outline:"none"}}/>
        <span style={{color:T.mut,fontSize:12,alignSelf:"center"}}>→</span>
        <input value={nv} onChange={e=>setNv(e.target.value)} placeholder="Replace with..." style={{flex:1,padding:"7px 10px",background:T.dw,border:`1px solid ${T.bdr}`,borderRadius:7,color:T.cream,fontSize:11,outline:"none"}}/>
        <button onClick={add} style={{padding:"7px 14px",background:nk&&nv?T.gold:T.card,color:nk&&nv?T.dark:T.mut,border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:nk&&nv?"pointer":"default"}}>Add</button>
      </div>
    </div>
  </div>);
}

function App(){
  const [tab,setTab]=useState("week");const [isOwner,setIsOwner]=useState(false);
  const [terms,setTerms]=useState(DEFAULT_TERMS);const [week,setWeek]=useState(initWeek);
  const [requests,setRequests]=useState([]);
  return(<div style={{minHeight:"100vh",background:T.dark,position:"relative",zIndex:1}}>
    <Header tab={tab} setTab={setTab} isOwner={isOwner} setIsOwner={setIsOwner}/>
    {tab==="week"&&<WeekTab week={week} setWeek={setWeek} terms={terms}/>}
    {tab==="trips"&&<TripsTab terms={terms}/>}
    {tab==="info"&&<InfoTab terms={terms}/>}
    {tab==="requests"&&<RequestsTab requests={requests} setRequests={setRequests} isOwner={isOwner}/>}
    {tab==="chat"&&<ChatTab terms={terms}/>}
    {tab==="owner"&&isOwner&&<OwnerTab terms={terms} setTerms={setTerms}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
